<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Success</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100">

<!-- Popup Container -->
    <div class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center p-4 z-50">

        <!-- Card -->
        <div class="bg-white rounded-3xl shadow-xl w-full max-w-sm p-8 text-center border border-slate-100">

            <!-- Success Icon - Softer Green Styling -->
            <div class="mx-auto w-20 h-20 bg-green-50 rounded-full flex items-center justify-center mb-6">
                <div class="w-14 h-14 bg-green-500 rounded-full flex items-center justify-center shadow-lg shadow-green-200">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/>
                    </svg>
                </div>
            </div>

            <!-- Title & Message -->
            <h2 class="text-2xl font-bold text-slate-800">Payment Successful!</h2>
            <p class="text-slate-500 mt-2 text-sm leading-relaxed">
                Your order has been received and sent to the restaurant. We appreciate your purchase.
            </p>

            <!-- Order Info Box -->
            <div class="mt-6 bg-green-50/50 border border-green-100 rounded-2xl p-4">
                <p class="text-xs font-semibold text-green-600 uppercase tracking-wider">Order Info</p>
                <p class="text-xs text-slate-400 mt-1">Amount Paid</p>
                <p class="text-3xl font-bold text-slate-800 mt-1">${{ "%.2f"|format(total_amount|float) }}</p>
            </div>

            <!-- Buttons -->
            <div class="flex flex-col gap-3 mt-8">
                <a href="/"
                   class="w-full bg-green-500 hover:bg-green-600 text-white py-3.5 rounded-xl font-semibold transition-all shadow-md shadow-green-100">
                    Back Home
                </a>
            </div>

        </div>
    </div>

</body>
</html>
