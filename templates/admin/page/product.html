{% extends 'admin/base.html' %}

{% block title %}Products{% endblock %}

{% block content %}

<div class="p-6">
    <!-- Header -->
    <div class="flex justify-between items-center mb-8">
        <h1 class="text-3xl font-bold text-gray-800">Products</h1>
        <button
            class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2.5 rounded-lg font-semibold shadow-sm transition">
            + Add Product
        </button>
    </div>

    <!-- Filters/Search -->
    <div class="flex flex-col sm:flex-row gap-4 mb-6">
        <input type="text" placeholder="Search products..."
            class="flex-grow border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-indigo-500 outline-none">
        <select class="border border-gray-300 rounded-lg px-4 py-2 bg-white">
            <option>All Categories</option>
            <option>Electronics</option>
            <option>Clothing</option>
        </select>
    </div>

    <!-- Table -->
    <div class="bg-white rounded-xl shadow border border-gray-200 overflow-hidden">
        <table class="w-full text-left">
            <thead class="bg-gray-50 border-b border-gray-200">
                <tr>
                    <th class="px-6 py-4 font-semibold text-gray-700">Product</th>
                    <th class="px-6 py-4 font-semibold text-gray-700">SKU</th>
                    <th class="px-6 py-4 font-semibold text-gray-700">Price</th>
                    <th class="px-6 py-4 font-semibold text-gray-700">Stock</th>
                    <th class="px-6 py-4 font-semibold text-gray-700 text-right">Actions</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-gray-100">
                <tr class="hover:bg-gray-50 transition">
                    <td class="px-6 py-4 font-medium text-gray-900">Wireless Mouse</td>
                    <td class="px-6 py-4 text-gray-500">WM-001</td>
                    <td class="px-6 py-4 text-gray-900">$29.99</td>
                    <td class="px-6 py-4">
                        <span class="bg-green-100 text-green-700 px-2 py-1 rounded text-xs font-bold">120 in
                            stock</span>
                    </td>
                    <td class="px-6 py-4 text-right">
                        <button class="text-indigo-600 hover:text-indigo-900 mr-3">Edit</button>
                        <button class="text-red-600 hover:text-red-900">Delete</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

{% endblock %}
